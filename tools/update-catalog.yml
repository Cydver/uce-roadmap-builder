name: Update Altema catalog

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 3"

permissions:
  contents: write

jobs:
  update-catalog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: npm install
      - name: Scrape Altema catalog and icons
        run: npm run scrape-altema
      - name: Resolve English names from Gundam Wiki with translation fallback
        env:
          GUNDAM_TRANSLATION_FALLBACK: "1"
        run: npm run enrich-catalog-names
      - name: Commit catalog updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/catalog.json icons/altema
          git diff --cached --quiet && echo "No changes" || git commit -m "Update Altema catalog"
          git push
